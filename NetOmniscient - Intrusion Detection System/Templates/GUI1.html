<script type="text/javascript">
    var gk_isXlsx = false;
    var gk_xlsxFileLookup = {};
    var gk_fileData = {};
    function filledCell(cell) {
        return cell !== '' && cell != null;
    }
    function loadFileData(filename) {
        if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
            try {
                var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
                var firstSheetName = workbook.SheetNames[0];
                var worksheet = workbook.Sheets[firstSheetName];

                // Convert sheet to JSON to filter blank rows
                var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
                // Filter out blank rows (rows where all cells are empty, null, or undefined)
                var filteredData = jsonData.filter(row => row.some(filledCell));

                // Heuristic to find the header row by ignoring rows with fewer filled cells than the next row
                var headerRowIndex = filteredData.findIndex((row, index) =>
                    row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
                );
                // Fallback
                if (headerRowIndex === -1 || headerRowIndex > 25) {

                console.error(e);

            }
        }

    }

                <button class="tab px-4 py-2 font-semibold text-gray-600 border-b-2 border-transparent hover:border-blue-500" data-tab="logs">Firewall Logs</button>

    <script>
        const socket = io();
        let logs = [];
        let packets = [];
        let alerts = [];

        // Escape HTML to prevent XSS
        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Debounce function to limit update frequency
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // Filter data based on input
        function filterData(data, filterText, fields) {
            if (!filterText) return data;
            filterText = filterText.toLowerCase();
            return data.filter(item => 
                fields.some(field => 
                    String(item[field] || '').toLowerCase().includes(filterText)
                )
            );
        }

        // Update table with virtualized rendering
        function updateTable(bodyId, data, maxRows, rowTemplate, filterId, filterFields) {
            const tbody = document.getElementById(bodyId);
            const filterText = document.getElementById(filterId)?.value || '';
            const filteredData = filterData(data, filterText, filterFields);
            while (filteredData.length > maxRows) {
                data.shift();
            }
            tbody.innerHTML = filteredData.map(rowTemplate).join('');
        }

        // Log row template
        function logRow(log) {
            return `<tr>
                <td class="p-2 border">${escapeHTML(log.timestamp)}</td>
                <td class="p-2 border">${escapeHTML(log['src-ip'])}</td>
                <td class="p-2 border">${escapeHTML(log['dst-ip'])}</td>
                <td class="p-2 border">${escapeHTML(log['src-port'])}</td>
                <td class="p-2 border">${escapeHTML(log['dst-port'])}</td>
                <td class="p-2 border">${escapeHTML(log.protocol)}</td>
                <td class="p-2 border">${escapeHTML(log.action)}</td>
                <td class="p-2 border">${escapeHTML(log.size)}</td>
            </tr>`;
        }

        // Packet row template
        function packetRow(packet) {
            return `<tr>
                <td class="p-2 border">${escapeHTML(packet.timestamp)}</td>
                <td class="p-2 border">${escapeHTML(packet['src-ip'])}</td>
                <td class="p-2 border">${escapeHTML(packet['dst-ip'])}</td>
                <td class="p-2 border">${escapeHTML(packet['src-port'])}</td>
                <td class="p-2 border">${escapeHTML(packet['dst-port'])}</td>
                <td class="p-2 border">${escapeHTML(packet.protocol)}</td>
                <td class="p-2 border">${escapeHTML(packet.size)}</td>
            </tr>`;
        }

        // Alert row template
        function alertRow(alert) {
            return `<tr class="alert ${escapeHTML(alert.type).includes('Error') ? 'bg-red-100' : 'bg-yellow-100'}">
                <td class="p-2 border">${escapeHTML(alert.timestamp)}</td>
                <td class="p-2 border">${escapeHTML(alert.type)}</td>
                <td class="p-2 border">${escapeHTML(alert.message)}</td>
            </tr>`;
        }

        // Debounced table updates
        const updateLogs = debounce(() => updateTable('logs_body', logs, 100, logRow, 'logs_filter', ['src-ip', 'dst-ip', 'src-port', 'dst-port', 'protocol', 'action', 'size']), 100);
        const updatePackets = debounce(() => updateTable('packets_body', packets, 100, packetRow, 'packets_filter', ['src-ip', 'dst-ip', 'src-port', 'dst-port', 'protocol', 'size']), 100);
        const updateAlerts = debounce(() => updateTable('alerts_body', alerts, 100, alertRow, 'alerts_filter', ['type', 'message']), 100);

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(content => content.classList.add('hidden'));
                document.getElementById(`${tab.dataset.tab}_tab`).classList.remove('hidden');
            });
        });

        // Filter input listeners
        document.getElementById('logs_filter')?.addEventListener('input', updateLogs);
        document.getElementById('packets_filter')?.addEventListener('input', updatePackets);
        document.getElementById('alerts_filter')?.addEventListener('input', updateAlerts);

        // SocketIO event handlers
        socket.on('connect', () => {
            document.getElementById('status').textContent = 'Connected to server';
            document.getElementById('status').classList.add('text-green-600');
        });

        socket.on('new_log', (log) => {
            logs.push(log);
            updateLogs();
        });

        socket.on('new_log_batch', (batch) => {
            logs.push(...batch);
            updateLogs();
        });

        socket.on('new_packet_batch', (batch) => {
            packets.push(...batch);
            updatePackets();
        });

        socket.on('alert', (alert) => {
            alert.timestamp = new Date().toLocaleString('en-US', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
            alerts.push(alert);
            updateAlerts();
        });

        socket.on('alert_batch', (batch) => {
            batch.forEach(alert => {
                alert.timestamp = new Date().toLocaleString('en-US', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
            });
            alerts.push(...batch);
            updateAlerts();
        });

        socket.on('heartbeat', (data) => {
            document.getElementById('status').textContent = `Connected (Last heartbeat: ${data.timestamp})`;
        });

        socket.on('config', (config) => {
            document.getElementById('log_path').value = config.log_path;
            const select = document.getElementById('network_interface');
            select.innerHTML = '<option value="">Disable Sniffing</option>' +
                config.available_interfaces.map(iface => `<option value="${iface}">${iface}</option>`).join('');
            select.value = config.network_interface || '';
        });

        socket.on('config_response', (response) => {
            const status = document.getElementById('config_status');
            status.textContent = response.message;
            status.className = `mt-2 text-sm ${response.status === 'success' ? 'text-green-600' : 'text-red-600'}`;
            setTimeout(() => status.textContent = '', 5000);
        });

        socket.on('test_response', (data) => {
            console.log('Test response:', data);
        });

        // Configuration updates
        document.getElementById('update_config').addEventListener('click', () => {
            const log_path = document.getElementById('log_path').value;
            const network_interface = document.getElementById('network_interface').value;
            socket.emit('update_config', { log_path, network_interface });
        });

        document.getElementById('reprocess_logs').addEventListener('click', () => {
            socket.emit('reprocess_logs', {});
        });

        // Test event for debugging
        document.addEventListener('DOMContentLoaded', () => {
            socket.emit('test_event', { message: 'Client connected' });
        });
    </script>
